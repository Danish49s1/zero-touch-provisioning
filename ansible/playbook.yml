---
- name: Zero Touch Server Setup
  hosts: webservers
  become: yes

  tasks:

    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Deploy index page
      copy:
        content: "<h1>Zero Touch Provisioning Works!</h1>"
        dest: /var/www/html/index.html
